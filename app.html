<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WBS Builder</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>WBS Builder</h1>
      <div class="header-actions">
        <button id="expandBtn" class="btn btn-small" title="Größere Ansicht öffnen">⤢ Ausklappen</button>
        <button id="importBtn" class="btn btn-secondary">Import</button>
        <button id="syncBtn" class="btn btn-primary">Sync</button>
        <button id="autoLayoutBtn" class="btn btn-secondary">Layout</button>
      </div>
    </header>

    <div class="settings-bar">
      <label class="settings-item">
        <input type="checkbox" id="showRootNumberCheckbox" checked />
        Wurzel-Nr. anzeigen
      </label>
      <label class="settings-item" id="rootStartLabel">
        Start:
        <input type="number" id="rootStartInput" class="settings-input" value="1" min="0" />
      </label>
      <label class="settings-item">
        Ebene 4 (grün):
        <select id="level4LayoutSelect" class="settings-input">
          <option value="vertical">untereinander</option>
          <option value="horizontal">nebeneinander</option>
        </select>
      </label>
    </div>

    <div class="main-layout">
      <!-- LINKE SEITE: Hierarchische Liste -->
      <section class="list-panel">
        <div class="panel-header">
          <h2>Gliederung</h2>
          <button id="addRootBtn" class="btn btn-small">+ Wurzel</button>
        </div>
        <div id="treeContainer" class="tree-container"></div>
      </section>

      <!-- RECHTE SEITE: Status / Mapping-Info -->
      <section class="status-panel">
        <div class="panel-header">
          <h2>Board-Status</h2>
        </div>
        <div id="statusContainer" class="status-container">
          <p class="hint">Hier siehst du, welche Knoten bereits auf dem Board existieren,
          welche neu angelegt und welche entfernt werden, sobald du auf
          <strong>"Sync → Board"</strong> klickst.</p>
          <div id="diffSummary"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Eigenes Dialog-Overlay (Ersatz für native alert/confirm/prompt, die in Miro-Panels
       nicht zuverlässig funktionieren) -->
  <div id="dialogOverlay" class="dialog-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
